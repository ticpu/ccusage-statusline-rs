name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create tarball
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          git archive --format=tar --prefix=ccusage-statusline-rs-${VERSION}/ HEAD | xz -c > ccusage-statusline-rs-${VERSION}.tar.xz

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ccusage-statusline-rs-*.tar.xz
          draft: false
          prerelease: false
          generate_release_notes: true

  build-binaries:
    name: Build Binaries
    needs: create-release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ccusage-statusline-rs-linux-x86_64
            binary_ext: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: ccusage-statusline-rs-linux-aarch64
            binary_ext: ""
          - os: ubuntu-latest
            target: x86_64-pc-windows-gnu
            artifact_name: ccusage-statusline-rs-windows-x86_64.exe
            binary_ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu pkg-config
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Install cross-compilation tools (windows-gnu)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PKG_CONFIG_ALLOW_CROSS: 1

      - name: Strip binary
        run: |
          case "${{ matrix.target }}" in
            aarch64-unknown-linux-gnu) STRIP=aarch64-linux-gnu-strip ;;
            x86_64-pc-windows-gnu) STRIP=x86_64-w64-mingw32-strip ;;
            *) STRIP=strip ;;
          esac
          $STRIP target/${{ matrix.target }}/release/ccusage-statusline-rs${{ matrix.binary_ext }}

      - name: Rename binary
        run: |
          mv target/${{ matrix.target }}/release/ccusage-statusline-rs${{ matrix.binary_ext }} ${{ matrix.artifact_name }}

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}